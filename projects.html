<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects Directory — ADNIN HURAIYAH</title>
    <style>
        :root {
            --background: #0a0a0c;
            --surface: #121216;
            --green: #10b981;
            --white: #f3f7f4;
            --muted: #9aa39d;
            --border: rgba(255, 255, 255, 0.12);
        }
        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--white);
            font-family: Arial, Helvetica, sans-serif;
        }
        /* Navigation */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background: rgba(10, 10, 12, 0.9);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(14px);
        }
        .logo {
            color: var(--white);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-links a {
            color: var(--muted);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.25s ease;
        }
        .nav-links a:hover,
        .nav-links .active {
            color: var(--green);
        }
        .talk-button {
            padding: 10px 18px;
            border-radius: 999px;
            background: var(--green);
            color: var(--background) !important;
            font-weight: 800;
            transition: transform 0.25s ease;
        }
        .talk-button:hover {
            transform: translateY(-3px);
        }
        /* Main section */
        .projects-section {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 100px 7%;
        }
        .eyebrow {
            margin: 0 0 20px;
            color: var(--green);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1.7px;
        }
        h1 {
            max-width: 900px;
            margin: 0 0 44px;
            font-size: clamp(40px, 5vw, 66px);
            line-height: 1.03;
            letter-spacing: -2.5px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }
        .project-card {
            display: flex;
            min-height: 150px;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 26px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
            text-align: left;
            cursor: pointer;
            transition:
                transform 0.25s ease,
                background 0.25s ease,
                border-color 0.25s ease;
        }
        .project-card:hover {
            transform: translateY(-6px);
            border-color: rgba(16, 185, 129, 0.55);
            background: rgba(16, 185, 129, 0.1);
        }
        .project-card .category-icon {
            margin-bottom: 13px;
            color: var(--green);
            font-size: 31px;
        }
        .project-card h2 {
            margin: 0 0 14px;
            font-size: 24px;
            line-height: 1.15;
        }
        .project-card p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }
        .project-card strong {
            margin-top: auto;
            padding-top: 18px;
            color: var(--green);
            font-size: 11px;
            letter-spacing: 0.7px;
        }
        /* Detail view */
        .project-detail {
            display: none;
        }
        .project-detail.active {
            display: block;
        }
        .back-panel {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.035);
            color: var(--white);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition:
                transform 0.25s ease,
                border-color 0.25s ease,
                background 0.25s ease;
        }
        .back-button:hover {
            transform: translateY(-3px);
            border-color: var(--green);
            background: rgba(16, 185, 129, 0.1);
        }
        .category-meta {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }
        .projects-item-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }
        .project-item {
            display: flex;
            flex-direction: column;
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
            text-align: left;
            transition:
                transform 0.25s ease,
                background 0.25s ease,
                border-color 0.25s ease;
        }
        .project-item:hover {
            transform: translateY(-6px);
            border-color: rgba(16, 185, 129, 0.55);
            background: rgba(16, 185, 129, 0.1);
        }
        .project-type {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--green);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.7px;
            width: fit-content;
        }
        .project-item h3 {
            margin: 0 0 16px;
            font-size: 18px;
            line-height: 1.3;
            color: var(--white);
        }
        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 16px;
        }
        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 10px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            transition:
                transform 0.25s ease,
                background 0.25s ease,
                border-color 0.25s ease;
        }
        .project-link:hover {
            transform: translateY(-2px);
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--green);
        }
        .next-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-top: 30px;
            padding: 20px 24px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.035);
        }
        .next-label {
            color: var(--green);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1.4px;
        }
        .next-button {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 12px 19px;
            border-radius: 999px;
            background: var(--green);
            color: var(--background);
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }
        .next-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(16, 185, 129, 0.2);
        }
        .animate {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 760px) {
            .navbar {
                padding: 18px 6%;
            }
            .nav-links a:not(.talk-button) {
                display: none;
            }
            .projects-section {
                padding: 75px 7%;
            }
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .projects-item-grid {
                grid-template-columns: 1fr;
            }
            .next-panel {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a class="logo" href="index.html">ADNIN HURAIYAH</a>
        <nav class="nav-links">
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="tools.html">Tools</a>
            <a class="active" href="projects.html">Projects</a>
            <a class="talk-button" href="contact.html">Let's Talk</a>
        </nav>
    </header>
    <main>
        <section class="projects-section">
            <!-- Category View -->
            <div id="categoryView">
                <p class="eyebrow animate delay-1">PROJECT PORTFOLIO</p>
                <h1 class="animate delay-2">
                    Selected work in spatial analysis, remote sensing, and environmental research.
                </h1>
                <div class="projects-grid animate delay-3" id="categoryGrid">
                    <!-- Categories will be inserted here -->
                </div>
                <div class="next-panel">
                    <span class="next-label">NEXT · CONTACT</span>
                    <a class="next-button" href="contact.html">
                        Get in touch <span>→</span>
                    </a>
                </div>
            </div>

            <!-- Detail View -->
            <div id="detailView" class="project-detail">
                <div class="back-panel">
                    <button class="back-button" onclick="goBackToCategories()">
                        ← Back to Projects
                    </button>
                    <p class="category-meta" id="categoryTitle"></p>
                </div>
                <div class="projects-item-grid" id="projectItemsGrid">
                    <!-- Projects will be inserted here -->
                </div>
            </div>
        </section>
    </main>

    <script>
        const CATEGORIES = [
            {
                name: "GIS / Spatial Analysis",
                icon: "🗺",
                projects: [
                    {
                        title: "ASEAN CO₂ emissions — spatio-temporal GIS mapping (1994–2024)",
                        type: "Folder",
                        url: "https://drive.google.com/drive/folders/1SpxDEp19epFhH99HuQL7MicTvsBkwacY?usp=sharing"
                    },
                    {
                        title: "CO₂ emission hotspots & urban afforestation suitability, Klang Valley",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1iyzPn8wv29SnTbSMLwNEBkNkrXC9qF9X/view?usp=sharing"
                    },
                    {
                        title: "Land use change in Johor — urban & industrial expansion",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1Ob2N-njobvCf8hElIEaagQ5s8SJFayjj/view?usp=sharing"
                    },
                    {
                        title: "Watershed delineation & drainage map, Pahang",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1YC-k6EXgxl2kLjMXji_bWljTikR0naJS/view?usp=sharing"
                    },
                    {
                        title: "Spatiotemporal roaming behaviour of a Malayan tapir",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1sP2EldQgg7ksQ1P0IHbo2oodryPqp6Cb/view?usp=sharing"
                    }
                ]
            },
            {
                name: "Remote Sensing",
                icon: "🛰",
                projects: [
                    {
                        title: "Intro to satellite imagery",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/14zacf4YOnz1iSADejTX8arXmTp3CzYyw/view?usp=sharing"
                    },
                    {
                        title: "Landsat 8 agriculture band composites",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1djNzblCWA9TXp0uSQlmd-j3BYVKwrESi/view?usp=sharing"
                    },
                    {
                        title: "Landsat RGB composite map",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1XhlnLlOSg9uuRlx8XcjfsD6sKDTeq213/view?usp=sharing"
                    }
                ]
            },
            {
                name: "Environmental Analysis",
                icon: "🌱",
                projects: [
                    {
                        title: "Carbon stock assessment, secondary forest behind UMK library",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1o0kgeAOzZ3LV48x_oM6thdZ3JAXdpT8M/view?usp=sharing"
                    },
                    {
                        title: "Energy sources: biomass",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1Gd44EnMXBg1kKL1VoJRhFIdYDlI6IhTD/view?usp=sharing"
                    },
                    {
                        title: "Community water sustainability, Kampung Laut",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1BaEAbO0aKq5NGx-UlxUGSsAj3DCqGDaa/view?usp=sharing"
                    }
                ]
            },
            {
                name: "Case Studies",
                icon: "📊",
                projects: [
                    {
                        title: "Bukit Merah 1982 radioactive pollution",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1pQHIBYAd5ZL_jrLghY4Sp0DRmV_qfmCD/view?usp=sharing"
                    },
                    {
                        title: "Putrajaya relocation — air quality & meteorological factors",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1HmKmXw_4XQnMgNmV6j_EhtXcuEbhB0ej/view?usp=sharing"
                    }
                ]
            },
            {
                name: "Applications",
                icon: "⚙️",
                projects: [
                    {
                        title: "Air quality monitoring app — Python GUI + ML",
                        type: "Folder",
                        url: "https://drive.google.com/drive/folders/1xEQMY3cGgeniHl1Ldo-zaG_D8cwUoc5l?usp=sharing"
                    },
                    {
                        title: "MyLestari — sustainable-living app concept",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1-u3Swybmg-LB4popq6ADbqrfRxpt9xVP/view?usp=sharing"
                    },
                    {
                        title: "Wind turbine food dryer",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/17KhA5hNepGOfx-udLQvKFthdXD5F2-bS/view?usp=sharing"
                    }
                ]
            },
            {
                name: "Data Analysis",
                icon: "📈",
                projects: [
                    {
                        title: "GreenScape Sustainability Initiative",
                        type: "Folder",
                        url: "https://drive.google.com/drive/folders/1xS7hY3Qwxb0tUzgEkLGNTbrAcsZVCFCI?usp=sharing"
                    },
                    {
                        title: "Ancient climate — ice-core CO₂ vs. temperature anomaly",
                        type: "Document",
                        url: "https://docs.google.com/document/d/1DPepfb3jRNo9C7D9UzpgzdBuVTviWJOn/edit?usp=sharing&ouid=102245110156341943649&rtpof=true&sd=true"
                    },
                    {
                        title: "Early industrial age to present climate",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1Q79D62FyCelDX9D_D2AJ1Qu2QfrQghb9/view?usp=sharing"
                    },
                    {
                        title: "ANOVA on soil P concentration",
                        type: "PDF",
                        url: "https://drive.google.com/file/d/1qtYT8AMA1zdW9HgbUVwOOP0mCo4sGdUe/view?usp=sharing"
                    }
                ]
            }
        ];

        function renderCategories() {
            const grid = document.getElementById("categoryGrid");
            grid.innerHTML = "";
            CATEGORIES.forEach((category, index) => {
                const card = document.createElement("button");
                card.className = "project-card";
                card.innerHTML = `
                    <span class="category-icon">${category.icon}</span>
                    <h2>${category.name}</h2>
                    <p>${category.projects.length} projects</p>
                    <strong>OPEN CATEGORY →</strong>
                `;
                card.onclick = () => showProjectDetail(index);
                grid.appendChild(card);
            });
        }

        function showProjectDetail(categoryIndex) {
            const category = CATEGORIES[categoryIndex];
            document.getElementById("categoryView").style.display = "none";
            document.getElementById("detailView").classList.add("active");
            document.getElementById("categoryTitle").textContent = `${category.name} · ${category.projects.length} items`;
            
            const itemsGrid = document.getElementById("projectItemsGrid");
            itemsGrid.innerHTML = "";

            category.projects.forEach((project) => {
                const item = document.createElement("article");
                item.className = "project-item";
                
                const downloadAction = getDownloadUrl(project);
                const openLabel = project.type === "Folder" ? "Open folder" : "View file";

                item.innerHTML = `
                    <span class="project-type">${project.type}</span>
                    <h3>${project.title}</h3>
                    <div class="project-actions">
                        <a href="${project.url}" target="_blank" rel="noopener noreferrer" class="project-link">
                            ${openLabel} →
                        </a>
                        ${downloadAction ? `<a href="${downloadAction}" target="_blank" rel="noopener noreferrer" class="project-link">Download ↓</a>` : ""}
                    </div>
                `;
                itemsGrid.appendChild(item);
            });
        }

        function getDownloadUrl(project) {
            if (project.type === "Folder") return null;
            
            if (project.url.includes("drive.google.com/file/d/")) {
                const fileId = project.url.match(/drive\.google\.com\/file\/d\/([^/]+)/)?.[1];
                return fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : null;
            }
            
            if (project.url.includes("docs.google.com/document/d/")) {
                const docId = project.url.match(/docs\.google\.com\/document\/d\/([^/]+)/)?.[1];
                return docId ? `https://docs.google.com/document/d/${docId}/export?format=pdf` : null;
            }
            
            return null;
        }

        function goBackToCategories() {
            document.getElementById("categoryView").style.display = "block";
            document.getElementById("detailView").classList.remove("active");
        }

        renderCategories();
    </script>
</body>
</html>
